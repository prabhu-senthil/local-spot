version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: localspot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: localspot

  backend:
    build:
      context: ./server
    container_name: localspot-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongodb:27017/localspot
      JWT_SECRET: your_jwt_secret_here
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
    container_name: localspot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongodb_data:

